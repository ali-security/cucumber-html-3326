name: Build and Upload Artifact

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cucumber-html-builder -f dockerfile .

      - name: Extract JAR via volume
        run: |
          mkdir -p target
          docker run --rm -v "$(pwd)/target:/output" cucumber-html-builder

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html
          path: target/*.jar
          if-no-files-found: error
