name: Build and Upload Artifact

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cucumber-html-builder -f dockerfile .

      - name: Extract JAR from image
        run: |
          id=$(docker create cucumber-html-builder)
          mkdir -p target
          docker cp "$id:/cucumber-html/target/cucumber-html-0.2.6.jar" target/
          docker rm "$id"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html
          path: target/cucumber-html-0.2.6.jar
          if-no-files-found: error
